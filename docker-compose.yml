# ──────────────────────────────────────────────────────────────
# docker-compose.yml (repository root)
#
# Canonical stack definition for local development.
#
# Services:
#   frontend  – React + Vite dev server  (port 5173)
#   backend   – FastAPI + Uvicorn        (port 8000)
#   neo4j     – Neo4j graph database     (browser 7474, bolt 7687)
#
# Usage:
#   docker compose up --build      Start everything
#   docker compose down            Stop everything
#   docker compose logs -f backend Follow backend logs
#
# students should NOT need to edit this.
# ──────────────────────────────────────────────────────────────

services:

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      - neo4j

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
